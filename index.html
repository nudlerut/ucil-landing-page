<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCIL - Premium Vape</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#05010a;
    overflow:hidden;
    color:white;
}

/* ===== CANVAS SMOKE ===== */
canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-3;
}

/* dark overlay */
.overlay{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.92));
    z-index:-2;
}

/* ===== LOADING SCREEN ===== */
.loader{
    position:fixed;
    inset:0;
    background:#05010a;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    animation:fadeOut 2s ease 3s forwards;
}

.loader h1{
    color:#FFD700;
    font-size:50px;
    letter-spacing:6px;
    text-shadow:0 0 20px #FFD700;
    animation:zoom 2s infinite alternate;
}

.loader p{
    color:#b300ff;
    margin-top:10px;
    letter-spacing:3px;
}

@keyframes zoom{
    from{ transform:scale(1); opacity:0.6; }
    to{ transform:scale(1.2); opacity:1; }
}

@keyframes fadeOut{
    to{ opacity:0; visibility:hidden; }
}

/* ===== HERO ===== */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.logo{
    font-size:60px;
    color:#FFD700;
    text-shadow:0 0 20px #FFD700, 0 0 40px #b300ff;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{ transform:scale(1); }
    to{ transform:scale(1.05); }
}

.subtitle{
    color:#caa6ff;
    letter-spacing:3px;
    margin-top:10px;
}

/* ===== BUTTON ===== */
.btn{
    margin-top:25px;
    padding:16px 40px;
    background:#25D366;
    color:black;
    border-radius:12px;
    font-weight:bold;
    text-decoration:none;
    box-shadow:0 0 20px #25D366;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.08); }
    100%{ transform:scale(1); }
}

/* ===== FLOATING WHATSAPP ===== */
.floating-wa{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:black;
    padding:15px 18px;
    border-radius:50px;
    font-weight:bold;
    text-decoration:none;
    box-shadow:0 0 20px #25D366;
    z-index:1000;
}

/* ===== SECTIONS ===== */
.section{
    padding:80px 20px;
    max-width:1100px;
    margin:auto;
}

.section h2{
    text-align:center;
    color:#FFD700;
    margin-bottom:30px;
    text-shadow:0 0 10px #b300ff;
}

.card{
    background:rgba(20,10,40,0.7);
    border:1px solid #b300ff44;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* hide overflow */
body.loaded{
    overflow:auto;
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader">
    <h1>UCIL</h1>
    <p>BANDAR GETAR POIPET</p>
</div>

<!-- AUDIO -->
<audio autoplay loop>
    <source src="ambient.mp3" type="audio/mpeg">
</audio>

<!-- CANVAS SMOKE -->
<canvas id="smoke"></canvas>
<div class="overlay"></div>

<!-- HERO -->
<section class="hero">
    <div class="logo">UCIL</div>
    <div class="subtitle">PREMIUM VAPE EXPERIENCE</div>
    <a class="btn" href="https://wa.me/855XXXXXXXX">ORDER NOW</a>
</section>

<!-- PRODUCTS -->
<section class="section">
<h2>PRODUK</h2>
<div class="grid">
    <div class="card">INFY POD</div>
    <div class="card">RELX ORIGINAL</div>
    <div class="card">LIQUID PREMIUM</div>
</div>
</section>

<!-- FLOAT WA -->
<a class="floating-wa" href="https://wa.me/855XXXXXXXX">
💬 WhatsApp
</a>

<script>
/* ===== LOADER REMOVE ===== */
setTimeout(()=>{
    document.querySelector('.loader').style.display='none';
    document.body.classList.add('loaded');
},3000);

/* ===== CANVAS SMOKE (VAPE PARTICLE SYSTEM) ===== */
const canvas = document.getElementById("smoke");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*6+2,
        dx:(Math.random()-0.5)*0.5,
        dy:(Math.random()-0.5)*0.5,
        alpha:Math.random()
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.fillStyle = `rgba(180,0,255,${p.alpha})`;
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#b300ff";
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x<0||p.x>canvas.width) p.dx *= -1;
        if(p.y<0||p.y>canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(draw);
}

draw();

/* resize */
window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
